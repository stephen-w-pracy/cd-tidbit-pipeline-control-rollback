# Values for the Prod environment.
# Selected automatically when <+env.name> resolves to "Prod".
#
# image_name and image_tag are read from the artifact the Build (CI) stage
# produced. These artifact expressions resolve in the CD stage at deploy time —
# a later stage consuming an earlier stage's output, with no value stored on the
# build runner. See:
#   https://developer.harness.io/docs/platform/variables-and-expressions/harness-expressions-reference#service-artifacts-expressions
env_name: Prod
env_color: "#198754"
app_version: <+artifacts.primary.tag>
image_name: <+artifacts.primary.imagePath>
image_tag: <+artifacts.primary.tag>
