apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-controls-content
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Pipeline Controls Demo</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #f8f9fa;
          color: #1a1a2e;
        }
        .card {
          text-align: center;
          padding: 3rem 4rem;
          border-radius: 12px;
          background: #fff;
          box-shadow: 0 4px 24px rgba(0,0,0,0.08);
          max-width: 90vw;
        }
        .badge {
          display: inline-block;
          padding: 0.4rem 1rem;
          border-radius: 20px;
          font-size: 0.85rem;
          font-weight: 600;
          letter-spacing: 0.03em;
          text-transform: uppercase;
          color: #fff;
          background: {{.Values.env_color}};
          margin-bottom: 1.5rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .version {
          font-size: 3rem;
          font-weight: 700;
          color: {{.Values.env_color}};
          margin: 1rem 0;
        }
        .meta { color: #6c757d; font-size: 0.9rem; }
        .image {
          margin-top: 1.5rem;
          padding-top: 1rem;
          border-top: 1px solid #e9ecef;
          font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
          font-size: 0.8rem;
          color: #495057;
          word-break: break-all;
        }
        .image .label {
          display: block;
          font-size: 0.7rem;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          color: #adb5bd;
          margin-bottom: 0.25rem;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <span class="badge">{{.Values.env_name}}</span>
        <h1>Pipeline Controls Demo</h1>
        <div class="version">{{.Values.app_version}}</div>
        <p class="meta">Deployed by Harness CD</p>
        <div class="image">
          <span class="label">Image</span>
          {{.Values.image_name}}:{{.Values.image_tag}}
        </div>
      </div>
    </body>
    </html>
