inputSet:
  pipeline:
    identifier: pipeline_controls_exemplar
    stages:
      - stage:
          identifier: Build
          type: CI
          spec:
            execution:
              steps:
                - step:
                    identifier: Build_and_Push
                    type: BuildAndPushDockerRegistry
                    spec:
                      connectorRef: stephenwpracyghcr
                      repo: app_image
      - stage:
          identifier: Deploy_to_Dev
          type: Deployment
          spec:
            service:
              serviceRef: pipelinecontrolsdemo
              serviceInputs:
                serviceDefinition:
                  type: Kubernetes
                  spec:
                    artifacts:
                      primary:
                        sources:
                          - identifier: GHCR
                            type: GithubPackageRegistry
                            spec:
                              version: <+pipeline.variables.app_version>
            environment:
              environmentRef: Dev
              infrastructureDefinitions:
                - identifier: Dev_Infra
      - stage:
          identifier: Deploy_to_Prod
          type: Deployment
          spec:
            environment:
              environmentRef: Prod
              infrastructureDefinitions:
                - identifier: Prod_Infra
    properties:
      ci:
        codebase:
          build:
            spec:
              branch: simplify-pipeline
            type: branch
  name: Demo Pipeline Inputs
  identifier: Demo_Pipeline_Inputs
  orgIdentifier: default
  projectIdentifier: stephenrollbackcontrols
