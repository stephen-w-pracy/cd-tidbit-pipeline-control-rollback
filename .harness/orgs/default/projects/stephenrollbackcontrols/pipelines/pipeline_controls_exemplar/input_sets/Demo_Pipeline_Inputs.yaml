inputSet:
  name: Demo Pipeline Inputs
  tags: {}
  identifier: Demo_Pipeline_Inputs
  orgIdentifier: default
  projectIdentifier: stephenrollbackcontrols
  pipeline:
    identifier: pipeline_controls_exemplar
    stages:
      - stage:
          identifier: Build
          type: CI
          spec:
            execution:
              steps:
                - step:
                    identifier: Build_and_Push
                    type: BuildAndPushDockerRegistry
                    spec:
                      connectorRef: stephenwpracyghcr
                      repo: ghcr.io/stephen-w-pracy/pipeline-controls-demo
      - stage:
          identifier: Deploy_to_Dev
          type: Deployment
          spec:
            service:
              serviceRef: pipelinecontrolsdemo
              serviceInputs:
                serviceDefinition:
                  type: Kubernetes
                  spec:
                    artifacts:
                      primary:
                        sources:
                          - identifier: GHCR
                            type: GithubPackageRegistry
                            spec:
                              version: <+pipeline.variables.app_version>
                        primaryArtifactRef: GHCR
            environment:
              environmentRef: Dev
      - stage:
          identifier: Deploy_to_Prod
          type: Deployment
          spec:
            environment:
              environmentRef: Prod
    properties:
      ci:
        codebase:
          build:
            type: branch
            spec:
              branch: main
