inputSet:
  name: Demo Pipeline Inputs
  tags: {}
  identifier: Demo_Pipeline_Inputs
  orgIdentifier: default
  projectIdentifier: stephenrollbackcontrols
  pipeline:
    identifier: pipeline_controls_exemplar
    stages:
      - stage:
          identifier: Build
          type: CI
          spec:
            execution:
              steps:
                - step:
                    identifier: Build_and_Push
                    type: BuildAndPushDockerRegistry
                    spec:
                      connectorRef: stephenwpracyghcr
                      repo: ghcr.io/stephen-w-pracy/pipeline-controls-demo
      - stage:
          identifier: Deploy_to_Dev
          type: Deployment
          spec:
            service:
              serviceRef: pipelinecontrolsdemo
              serviceInputs:
                serviceDefinition:
                  type: Kubernetes
                  spec:
                    artifacts:
                      primary:
                        sources:
                          - identifier: app_image
                            type: DockerRegistry
                            spec:
                              version: <+pipeline.variables.app_version>
                              connectorRef: stephenwpracyghcr
                              imagePath: ghcr.io/stephen-w-pracy/pipeline-controls-demo
                        primaryArtifactRef: app_image
            environment:
              environmentRef: Dev
              infrastructureDefinitions:
                - identifier: Dev_Infra
      - stage:
          identifier: Deploy_to_Prod
          type: Deployment
          spec:
            environment:
              environmentRef: Prod
              infrastructureDefinitions:
                - identifier: Prod_Infra
    properties:
      ci:
        codebase:
          build: <+input>
