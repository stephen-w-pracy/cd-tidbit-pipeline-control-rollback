pipeline:
  name: Pipeline Controls Exemplar
  identifier: pipeline_controls_exemplar
  projectIdentifier: stephenrollbackcontrols
  orgIdentifier: default
  tags: {}
  variables:
    - name: target_envs
      type: String
      description: Comma-separated target environments (dev or dev,prod)
      value: <+input>.default(dev)
    - name: app_version
      type: String
      description: "Version label and image tag. Derived from the incremental pipeline execution sequence id (<+pipeline.sequenceId>), so it advances automatically on every run with no manual entry. This is an execution-time value: it does not exist until the run starts."
      value: <+"v" + pipeline.sequenceId>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: Builds and pushes the container image, tagged with the sequence id.
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: stephenwpracyghcr
                    repo: ghcr.io/stephen-w-pracy/pipeline-controls-demo
                    tags:
                      - <+pipeline.variables.app_version>
                    dockerfile: app/Dockerfile
                    context: app
    - stage:
        name: Deploy to Dev
        identifier: Deploy_to_Dev
        description: Always runs. Deploys the built image to the Dev environment.
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: pipelinecontrolsdemo
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      sources:
                        - identifier: pipelinecontrolsdemo
                          type: GithubPackageRegistry
                          spec:
                            version: <+pipeline.variables.app_version>
          environment:
            environmentRef: <+input>
            deployToAll: false
            infrastructureDefinitions: <+input>
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: Rolling_Deploy_Dev
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback
                  identifier: Rollback_Dev
                  spec: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
    - stage:
        name: Deploy to Prod
        identifier: Deploy_to_Prod
        description: Conditional execution. Runs only when target_envs includes "prod" (set via Input Set). Otherwise the stage is skipped.
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: pipelinecontrolsdemo
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      sources:
                        - identifier: pipelinecontrolsdemo
                          type: GithubPackageRegistry
                          spec:
                            version: <+pipeline.variables.app_version>
          environment:
            environmentRef: <+input>
            deployToAll: false
            infrastructureDefinitions: <+input>
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: Rolling_Deploy_Prod
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback
                  identifier: Rollback_Prod
                  spec: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.target_envs>.contains("prod")
  properties:
    ci:
      codebase:
        connectorRef: github
        build: <+input>
        sparseCheckout: []
