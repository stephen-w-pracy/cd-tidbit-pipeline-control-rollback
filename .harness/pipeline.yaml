pipeline:
  name: Pipeline Controls Exemplar
  identifier: pipeline_controls_exemplar
  projectIdentifier: <+input>
  orgIdentifier: <+input>
  tags: {}
  variables:
    - name: target_envs
      type: String
      description: Comma-separated target environments (dev or dev,prod)
      value: dev
    - name: app_version
      type: String
      description: Application version label displayed on the page
      value: <+input>
    - name: env_color
      type: String
      description: Accent color for the environment badge
      value: "#0d6efd"
  stages:
    - stage:
        name: Build
        identifier: Build
        description: Builds and pushes the container image.
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesHosted
            spec:
              identifier: harness_cloud
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: <+input>
                    repo: <+input>
                    tags:
                      - <+pipeline.variables.app_version>
                    dockerfile: app/Dockerfile
                    context: app
        when:
          pipelineStatus: All

    - stage:
        name: Deploy to Dev
        identifier: Deploy_to_Dev
        description: Always runs. Deploys the built image to the Dev environment.
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+input>
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources:
                        - identifier: app_image
                          type: DockerRegistry
                          spec:
                            connectorRef: <+input>
                            imagePath: <+input>
                            tag: <+pipeline.variables.app_version>
          environment:
            environmentRef: <+input>
            deployToAll: false
            infrastructureDefinitions:
              - identifier: <+input>
          execution:
            steps:
              - step:
                  type: K8sApply
                  name: Apply ConfigMap
                  identifier: Apply_ConfigMap
                  spec:
                    filePaths:
                      - k8s/configmap.yaml
                    skipDryRun: false
                    skipSteadyStateCheck: true
                    overrides:
                      - manifest:
                          identifier: env_overrides
                          type: Values
                          spec:
                            store:
                              type: Inline
                              spec:
                                content: |
                                  env_color: "#0d6efd"
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: Rolling_Deploy_Dev
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback
                  identifier: Rollback_Dev
                  spec: {}
        when:
          pipelineStatus: All

    - stage:
        name: Deploy to Prod
        identifier: Deploy_to_Prod
        description: Conditional. Deploys to Prod when target_envs includes "prod". Execution-time input confirms the version.
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            useFromStage:
              stage: Deploy_to_Dev
          environment:
            environmentRef: <+input>
            deployToAll: false
            infrastructureDefinitions:
              - identifier: <+input>
          execution:
            steps:
              - step:
                  type: K8sApply
                  name: Apply ConfigMap
                  identifier: Apply_ConfigMap_Prod
                  spec:
                    filePaths:
                      - k8s/configmap.yaml
                    skipDryRun: false
                    skipSteadyStateCheck: true
                    overrides:
                      - manifest:
                          identifier: env_overrides
                          type: Values
                          spec:
                            store:
                              type: Inline
                              spec:
                                content: |
                                  env_color: "#198754"
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: Rolling_Deploy_Prod
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback
                  identifier: Rollback_Prod
                  spec: {}
        when:
          pipelineStatus: All
          condition: <+pipeline.variables.target_envs>.contains("prod")
