pipeline:
  name: Pipeline Controls Exemplar
  identifier: pipeline_controls_exemplar
  projectIdentifier: <+input>
  orgIdentifier: <+input>
  tags: {}
  variables:
    - name: target_envs
      type: String
      description: Comma-separated target environments (dev or dev,prod)
      value: dev
    - name: app_version
      type: String
      description: >-
        Version label shown on the page and used as the image tag. Derived from
        the incremental pipeline execution sequence id, so it advances
        automatically on every run (no manual entry).
      value: v<+pipeline.sequenceId>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: Builds and pushes the container image.
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesHosted
            spec:
              identifier: harness_cloud
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: <+input>
                    repo: <+input>
                    tags:
                      - <+pipeline.variables.app_version>
                    dockerfile: app/Dockerfile
                    context: app
        when:
          pipelineStatus: All

    - stage:
        name: Deploy to Dev
        identifier: Deploy_to_Dev
        description: Always runs. Deploys the built image to the Dev environment.
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+input>
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources:
                        - identifier: app_image
                          type: DockerRegistry
                          spec:
                            connectorRef: <+input>
                            imagePath: <+input>
                            tag: <+pipeline.variables.app_version>
          environment:
            environmentRef: <+input>
            deployToAll: false
            infrastructureDefinitions:
              - identifier: <+input>
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: Rolling_Deploy_Dev
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback
                  identifier: Rollback_Dev
                  spec: {}
        when:
          pipelineStatus: All

    - stage:
        name: Deploy to Prod
        identifier: Deploy_to_Prod
        description: >-
          Conditional. Deploys to Prod when target_envs includes "prod". Pauses
          for an execution-time input (prod_confirm) before rolling out.
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            useFromStage:
              stage: Deploy_to_Dev
          environment:
            environmentRef: <+input>
            deployToAll: false
            infrastructureDefinitions:
              - identifier: <+input>
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Confirm Prod Release
                  identifier: Confirm_Prod_Release
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Prod release confirmed: <+stage.variables.prod_confirm>"
                          echo "Deploying version <+pipeline.variables.app_version> to <+env.name>"
                    environmentVariables: []
                    outputVariables: []
                  timeout: 1h
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: Rolling_Deploy_Prod
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback
                  identifier: Rollback_Prod
                  spec: {}
        variables:
          - name: prod_confirm
            type: String
            description: >-
              Execution-time input. The pipeline pauses here and waits for the
              operator to confirm the production rollout before it proceeds.
            value: <+input>.selectOneFrom(approve,hold).executionInput()
        when:
          pipelineStatus: All
          condition: <+pipeline.variables.target_envs>.contains("prod")
