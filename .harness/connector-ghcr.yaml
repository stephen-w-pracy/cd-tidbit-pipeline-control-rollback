connector:
  name: pipeline-demo-ghcr
  identifier: pipelinedemoghcr
  description: ""
  tags:
    pipeline-demo: ""
  accountIdentifier: ${HARNESS_ACCOUNT_ID}
  orgIdentifier: ${HARNESS_ORG}
  projectIdentifier: ${HARNESS_PROJECT}
  type: DockerRegistry
  spec:
    dockerRegistryUrl: https://ghcr.io/${GITHUB_USERNAME}
    providerType: Other
    auth:
      type: UsernamePassword
      spec:
        username: ${GITHUB_USERNAME}
        passwordRef: ghcr_token
    executeOnDelegate: false
    proxy: false
    ignoreTestConnection: false
