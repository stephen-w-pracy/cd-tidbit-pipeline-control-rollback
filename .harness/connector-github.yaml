connector:
  name: pipeline-demo-github
  identifier: github
  description: GitHub connector for the pipeline controls tidbit
  tags:
    pipeline-demo: ""
  accountIdentifier: ${HARNESS_ACCOUNT_ID}
  orgIdentifier: ${HARNESS_ORG}
  projectIdentifier: ${HARNESS_PROJECT}
  type: Github
  spec:
    url: https://github.com/${GITHUB_USERNAME}/${GITHUB_REPO}
    authentication:
      type: Http
      spec:
        type: UsernameToken
        spec:
          username: ${GITHUB_USERNAME}
          tokenRef: ghcr_token
    apiAccess:
      type: Token
      spec:
        tokenRef: ghcr_token
    executeOnDelegate: false
    proxy: false
    ignoreTestConnection: false
    type: Repo
