secret:
  type: SecretText
  name: ghcr_token
  identifier: ghcr_token
  orgIdentifier: ${HARNESS_ORG}
  projectIdentifier: ${HARNESS_PROJECT}
  description: "GitHub PAT used by the GitHub and GHCR connectors"
  spec:
    secretManagerIdentifier: harnessSecretManager
    valueType: Inline
    value: ${GITHUB_PAT}
