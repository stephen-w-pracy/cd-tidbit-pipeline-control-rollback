inputSet:
  pipeline:
    identifier: pipeline_controls_exemplar
    stages:
      - stage:
          identifier: Build
          type: CI
          spec:
            execution:
              steps:
                - step:
                    identifier: Build_and_Push
                    type: BuildAndPushDockerRegistry
                    spec:
                      connectorRef: stephenwpracyghcr
                      repo: ghcr.io/stephen-w-pracy/pipeline-controls-demo
      - stage:
          identifier: Deploy_to_Dev
          type: Deployment
          spec:
            service:
              serviceRef: pipelinecontrolsdemo
              serviceInputs:
                serviceDefinition:
                  type: Kubernetes
                  spec:
                    - name: image
                      type: String
                      value: <+pipeline.variables.docker_image>
                    - name: version
                      type: String
                      value: <+pipeline.variables.app_version>
            environment:
              environmentRef: Dev
              infrastructureDefinitions:
                - identifier: Dev_Infra
      - stage:
          identifier: Deploy_to_Prod
          type: Deployment
          spec:
            environment:
              environmentRef: Prod
              infrastructureDefinitions:
                - identifier: Prod_Infra
    properties:
      ci:
        codebase:
          build:
            type: branch
            spec:
              branch: main
  name: New Pipeline Input Set
  identifier: New_Pipeline_Input_Set
  orgIdentifier: default
  projectIdentifier: stephenrollbackcontrols
