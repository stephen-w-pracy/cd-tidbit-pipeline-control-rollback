inputSet:
  name: Full Release
  identifier: full_release
  orgIdentifier: ${HARNESS_ORG}
  projectIdentifier: ${HARNESS_PROJECT}
  tags:
    pipeline-demo: ""
  pipeline:
    identifier: pipelinecontrols
    variables:
      - name: target_envs
        value: "dev,prod"
    stages:
      - stage:
          identifier: Deploy_to_Dev
          type: Deployment
          spec:
            environment:
              environmentRef: Dev
              infrastructureDefinitions:
                - identifier: Dev_Infra
      - stage:
          identifier: Deploy_to_Prod
          type: Deployment
          spec:
            environment:
              environmentRef: Prod
              infrastructureDefinitions:
                - identifier: Prod_Infra
    properties:
      ci:
        codebase:
          build:
            type: branch
            spec:
              branch: main
