inputSet:
  name: Full Release
  identifier: full_release
  orgIdentifier: <+input>
  projectIdentifier: <+input>
  pipeline:
    identifier: pipeline_controls_exemplar
    variables:
      # Deploys to Dev and Prod. The Prod stage's conditional execution
      # (target_envs.contains("prod")) evaluates true, so Prod runs and pauses
      # for the prod_confirm execution-time input.
      - name: target_envs
        value: "dev,prod"
