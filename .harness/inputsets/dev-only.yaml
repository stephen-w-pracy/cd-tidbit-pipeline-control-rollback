inputSet:
  name: Dev Only
  identifier: dev_only
  orgIdentifier: default
  projectIdentifier: stephenrollbackcontrols
  tags: {}
  pipeline:
    identifier: pipeline_controls_exemplar
    variables:
      - name: target_envs
        value: "dev"
    stages:
      - stage:
          identifier: Deploy_to_Dev
          type: Deployment
          spec:
            environment:
              environmentRef: Dev
              infrastructureDefinitions:
                - identifier: Dev_Infra
      - stage:
          identifier: Deploy_to_Prod
          type: Deployment
          spec:
            environment:
              environmentRef: Prod
              infrastructureDefinitions:
                - identifier: Prod_Infra
    properties:
      ci:
        codebase:
          build:
            type: branch
            spec:
              branch: main
