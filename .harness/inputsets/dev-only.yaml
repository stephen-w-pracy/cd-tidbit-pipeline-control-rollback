inputSet:
  name: Dev Only
  identifier: dev_only
  orgIdentifier: <+input>
  projectIdentifier: <+input>
  pipeline:
    identifier: pipeline_controls_exemplar
    variables:
      # Deploys to Dev only. The Prod stage's conditional execution
      # (target_envs.contains("prod")) evaluates false, so Prod is skipped.
      - name: target_envs
        value: "dev"
